server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;

    # js/core/Config.js is generated by generate_config.sh and never baked into
    # the image; never let a stale cached copy hide a config change.
    location = /js/core/Config.js {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
